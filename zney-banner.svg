<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="100%" height="100%">
  <defs>
    <!-- Modern Vercel / Linear-style subtle background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#161B22" />
    </linearGradient>

    <!-- Refined Shimmer Text Gradient -->
    <linearGradient id="textShimmer" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#F0F6FC" />
      <stop offset="30%" stop-color="#58A6FF" />
      <stop offset="50%" stop-color="#38BDF8" />
      <stop offset="70%" stop-color="#F0F6FC" />
      <stop offset="100%" stop-color="#8B949E" />
      <animate attributeName="x1" from="-100%" to="100%" dur="6s" repeatCount="indefinite" />
      <animate attributeName="x2" from="100%" to="300%" dur="6s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Subtle Subtle Ambient Glow -->
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" opacity="0.35" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap');

    .card {
      fill: url(#cardBg);
      stroke: #21262D;
      stroke-width: 1.2;
    }

    .title {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 52px;
      letter-spacing: 12px;
      fill: url(#textShimmer);
      filter: url(#softGlow);
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 13.5px;
      fill: #8B949E;
      letter-spacing: 2px;
    }

    .status-dot {
      fill: #2EA043;
      animation: pulseDot 2.5s ease-in-out infinite;
    }

    .status-ring {
      fill: none;
      stroke: #2EA043;
      stroke-width: 1.5;
      opacity: 0.6;
      animation: pingRing 2.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    @keyframes pingRing {
      0% { r: 4px; opacity: 0.8; }
      80%, 100% { r: 11px; opacity: 0; }
    }
  </style>

  <!-- Clean Minimalist Container -->
  <rect class="card" x="4" y="4" width="792" height="122" rx="14" />

  <!-- Shimmering Minimalist Title -->
  <text class="title" x="50%" y="48%" text-anchor="middle" dominant-baseline="middle">Z N E Y</text>

  <!-- Animated Live Status Indicator Dot + Ring -->
  <g transform="translate(178, 88)">
    <circle class="status-ring" cx="0" cy="0" r="4" />
    <circle class="status-dot" cx="0" cy="0" r="3.5" />
  </g>

  <!-- Clean Professional Subtitle -->
  <text class="subtitle" x="50%" y="89.5%" text-anchor="middle">FULL-STACK WEB DEVELOPMENT ENGINEER • UEH IT</text>
</svg>
